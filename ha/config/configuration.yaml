# Home Assistant configuration for the Liebe e2e test environment.
# Committed as-is; runtime state (.storage, logs, DBs) is gitignored.
# See docs/changes/0005-dockerized-ha-e2e.md.

# Panel + REST/WS API surface. This deliberately does NOT use `default_config:`
# because default_config hard-pulls the `go2rtc` integration (HA runs a bundled
# go2rtc binary in Docker), which makes every camera a WebRTC (`WEB_RTC`) stream.
# With no `default_config:` and no `go2rtc:` block, HA's go2rtc setup returns
# early WITHOUT registering a WebRTC provider, so the ffmpeg cameras below fall
# back to HLS through HA's own authenticated proxy (:8123) — robust to route
# remotely (no ICE candidate host, no :8555) and free of go2rtc's active
# `exec:`-producer quirks. See the camera block and docs/changes/0007 for the
# full rationale; WebRTC parity is validated in production against real cameras.
# (person/zone/automation/scene/script/tag persist from .storage; recorder,
# http, auth, websocket_api, lovelace load transitively from the keys below.)
frontend:
config:
api:
stream:
history:
logbook:
media_source:
system_health:
network:

# The demo integration provides a deterministic set of fake devices across
# many domains (light, switch, climate, cover, fan, sensor, binary_sensor,
# media_player, etc.) so cards have real entities to render.
demo:

# Register the built Liebe panel as a real custom panel. `name` and `url_path`
# MUST match the production values in src/config/panel.ts (liebe-panel, /liebe);
# the panel-config parity test in tests/e2e/panel-loads.spec.ts guards this.
# The bundle is mounted at /config/www/dist and served from /local/dist.
panel_custom:
  - name: liebe-panel
    sidebar_title: Liebe
    sidebar_icon: mdi:heart
    url_path: liebe
    module_url: /local/dist/panel.js
    embed_iframe: false
    require_admin: false

# Camera streaming test infrastructure (docs/changes/0007). The go2rtc
# sidecar (see ../docker-compose.yml) restreams over RTSP inside the compose
# network; HA consumes those restreams as ffmpeg cameras and serves them as
# HLS through its own authenticated proxy (:8123).
#
# The go2rtc WebRTC integration is intentionally DISABLED in the dev/e2e stack.
# HA 2026.7.2's bundled go2rtc-client (0.4.0) crashes parsing go2rtc 1.9.14's
# ACTIVE `exec:`-source producers — they report `source` instead of `url`, so
# `rest.list()` raises `MissingField "url"` and every `ws_webrtc_offer` fails
# with `unknown_error` once any synthetic stream goes active (breaks a
# multi-camera dashboard; a single-camera test slips through). Dropping the
# `go2rtc:` block makes HA treat these as plain ffmpeg cameras and stream over
# HLS — robust to route remotely (no ICE candidate host, no :8555). WebRTC
# parity is validated in production against real cameras; the go2rtc/WebRTC
# demo setup is to be revisited separately. See docs/changes/0007.
ffmpeg:

camera:
  # Fully synthetic, deterministic test pattern — the guaranteed CI camera.
  - platform: ffmpeg
    name: E2E Pattern
    input: rtsp://go2rtc:8554/e2e_pattern
  # Optional personal stream, only live when RTSP_TEST_URL is exported to the
  # go2rtc container (never committed). Unavailable/idle otherwise, which HA
  # tolerates; e2e tests must not depend on this entity.
  - platform: ffmpeg
    name: Personal
    input: rtsp://go2rtc:8554/personal

# Deterministic helper entities for stable e2e assertions. These have fixed
# entity_ids and known initial states, unlike the demo entities which may
# drift between HA releases.
input_boolean:
  e2e_flag:
    name: E2E Flag
    initial: false
    icon: mdi:flag

input_number:
  e2e_level:
    name: E2E Level
    initial: 42
    min: 0
    max: 100
    step: 1

input_select:
  e2e_mode:
    name: E2E Mode
    options:
      - alpha
      - beta
      - gamma
    initial: alpha

input_text:
  e2e_label:
    name: E2E Label
    initial: hello-e2e

input_datetime:
  e2e_moment:
    name: E2E Moment
    has_date: true
    has_time: true
    initial: '2026-01-01 12:00:00'

# Template sensors derived from the helpers above give fully deterministic
# values to assert on.
template:
  - sensor:
      - name: E2E Level Doubled
        unique_id: e2e_level_doubled
        state: "{{ (states('input_number.e2e_level') | float(0)) * 2 }}"
      - name: E2E Flag Text
        unique_id: e2e_flag_text
        state: "{{ 'on' if is_state('input_boolean.e2e_flag', 'on') else 'off' }}"
